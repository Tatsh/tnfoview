---
jobs:
  build-macos:
    runs-on: ${{ matrix.os }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install deps
        run: brew install qt
      - env:
          BUILD_TYPE: ${{ matrix.build-type }}
        run: |
          cmake -G Ninja -B build -DCMAKE_BUILD_TYPE="$BUILD_TYPE" \
            --install-prefix "$GITHUB_WORKSPACE/build/prefix"
          cmake --build build --config "$BUILD_TYPE" --verbose
          cmake --install "$GITHUB_WORKSPACE/build" --config "$BUILD_TYPE" --verbose
      - name: Package
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
        run: >-
          cpack -C "$BUILD_TYPE"
          --config "$GITHUB_WORKSPACE/build/CPackConfig.cmake" --verbose
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: error
          name: tnfoview-${{ matrix.build-type }}-${{ matrix.os }}
          path: |
            ${{github.workspace}}/tnfoview-*.zip
            ${{github.workspace}}/tnfoview-*.dmg
      - name: Attest
        uses: 'actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32'
        with:
          subject-path: |
            ${{github.workspace}}/tnfoview-*.zip
            ${{github.workspace}}/tnfoview-*.dmg
      - if: ${{ github.ref_type == 'tag' }}
        name: Upload package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$REF_NAME" --draft --title "$REF_NAME" --notes '' --verify-tag || true
          gh release upload "$REF_NAME" tnfoview-*.zip tnfoview-*.dmg --clobber
    strategy:
      fail-fast: false
      matrix:
        build-type: [Debug, Release]
        os: [macos-latest, macos-15-intel]
  build-msys:
    runs-on: ${{ matrix.sys.runner }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - id: fixed_workspace
        name: Fix path
        run: >-
          echo out=$("$env:GITHUB_WORKSPACE" -Replace "\\","/") | Out-File
          -FilePath $env:GITHUB_OUTPUT -Encoding utf8 -Append
      - if: matrix.sys.name == 'clangarm64'
        name: Install NSIS via Chocolatey
        run: |
          choco install nsis -y --no-progress
          'C:\Program Files (x86)\NSIS' | Out-File -Append -Encoding utf8 -FilePath $env:GITHUB_PATH
      - uses: 'msys2/setup-msys2@66cd2cce69caa17b53920067426061ca1de3a884'
        with:
          install: >-
            make
          msystem: ${{matrix.sys.name}}
          pacboy: >-
            cmake:p
            ninja:p
            ${{ matrix.sys.name == 'clangarm64' && ' ' || 'nsis:p' }}
            qt6-base:p
            qt6-tools:p
            toolchain:p
            zlib:p
          update: true
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Configure
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
          CPACK_SYSTEM: ${{ matrix.sys.cpack_system }}
          OUT: ${{ steps.fixed_workspace.outputs.out }}
        run: >-
          cmake -G Ninja -B "$OUT/build"
          --install-prefix "$OUT/build/prefix"
          -DCMAKE_BUILD_TYPE="$BUILD_TYPE"
          -DCPACK_SYSTEM_NAME="$CPACK_SYSTEM"
        shell: msys2 {0}
      - name: Build
        env:
          OUT: ${{ steps.fixed_workspace.outputs.out }}
        run: cmake --build "$OUT/build" --verbose
        shell: msys2 {0}
      - name: Install
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
          OUT: ${{ steps.fixed_workspace.outputs.out }}
        run: >-
          cmake --install "$OUT/build"
          --config "$BUILD_TYPE" --verbose
        shell: msys2 {0}
      - name: Package
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
          OUT: ${{ steps.fixed_workspace.outputs.out }}
        run: >-
          cpack -C "$BUILD_TYPE"
          --config "$OUT/build/CPackConfig.cmake" --verbose
        shell: msys2 {0}
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: error
          name: tnfoview-${{ matrix.build-type }}-${{ matrix.sys.name }}
          path: |
            ${{github.workspace}}/tnfoview-*.exe
            ${{github.workspace}}/tnfoview-*.zip
      - name: Attest
        uses: 'actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32'
        with:
          subject-path: |
            ${{github.workspace}}/tnfoview-*.exe
            ${{github.workspace}}/tnfoview-*.zip
      - if: ${{ github.ref_type == 'tag' && matrix.sys.release }}
        name: Upload package
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$REF_NAME" --draft --title "$REF_NAME" --notes '' --verify-tag || true
          gh release upload "$REF_NAME" tnfoview-*.exe tnfoview-*.zip --clobber
    strategy:
      fail-fast: false
      matrix:
        build-type: [Debug, Release]
        sys:
          - cpack_system: win64
            env: x86_64
            name: mingw64
            release: false
            runner: windows-latest
          - cpack_system: win64
            env: ucrt-x86_64
            name: ucrt64
            release: true
            runner: windows-latest
          - cpack_system: winarm64
            env: clang-aarch64
            name: clangarm64
            release: true
            runner: windows-11-arm
  build-linux:
    runs-on: ${{ matrix.arch.runner }}
    permissions:
      attestations: write
      contents: write
      id-token: write
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          fetch-depth: 0
          persist-credentials: false
      - name: Install Qt
        uses: 'jurplel/install-qt-action@48d3ad6db93f3627c8ee7a0454bc6f3744f7e730'
      - name: Configure
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
        run: >-
          cmake -DCMAKE_BUILD_TYPE="$BUILD_TYPE" -B "$GITHUB_WORKSPACE/build"
          --install-prefix "$GITHUB_WORKSPACE/build/AppDir/usr"
          -DCMAKE_INTERPROCEDURAL_OPTIMIZATION=ON
      - name: Build
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
        run: cmake --build "$GITHUB_WORKSPACE/build" --verbose --config "$BUILD_TYPE"
      - name: Install
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
        run: cmake --install "$GITHUB_WORKSPACE/build" --config "$BUILD_TYPE" --verbose
      - name: Package
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
        run: >-
          cpack -C "$BUILD_TYPE"
          --config "$GITHUB_WORKSPACE/build/CPackConfig.cmake" --verbose
      - name: Create AppImage
        env:
          BUILD_TYPE: ${{ matrix.build-type }}
          DEPLOY_ARCH: ${{ matrix.arch.deploy_arch }}
          EXTRA_PLATFORM_PLUGINS: 'libqwayland-generic.so;libqwayland-egl.so'
          EXTRA_QT_PLUGINS: 'wayland-decoration-client;wayland-graphics-integration-client;wayland-shell-integration'
        run: |
          wget "https://github.com/TheAssassin/linuxdeploy/releases/download/continuous/linuxdeploy-${DEPLOY_ARCH}.AppImage"
          wget "https://github.com/linuxdeploy/linuxdeploy-plugin-qt/releases/download/continuous/linuxdeploy-plugin-qt-${DEPLOY_ARCH}.AppImage"
          chmod +x "linuxdeploy-${DEPLOY_ARCH}.AppImage" "linuxdeploy-plugin-qt-${DEPLOY_ARCH}.AppImage"
          export QMAKE="$(command -v qmake6)"
          "./linuxdeploy-${DEPLOY_ARCH}.AppImage" --appdir "$GITHUB_WORKSPACE/build/AppDir" --plugin qt --output appimage
          rm "./linuxdeploy-${DEPLOY_ARCH}.AppImage" "./linuxdeploy-plugin-qt-${DEPLOY_ARCH}.AppImage"
          mv -v "$GITHUB_WORKSPACE"/*.AppImage "$GITHUB_WORKSPACE/tnfoview-${BUILD_TYPE}-${DEPLOY_ARCH}.AppImage"
      - if: ${{ github.ref_type == 'tag' && matrix.build-type == 'Release' }}
        name: Rename with tag
        env:
          DEPLOY_ARCH: ${{ matrix.arch.deploy_arch }}
          REF_NAME: ${{ github.ref_name }}
        run: >-
          mv -v "$GITHUB_WORKSPACE"/tnfoview-*.AppImage
          "$GITHUB_WORKSPACE/tnfoview-${REF_NAME}-${DEPLOY_ARCH}.AppImage"
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: error
          name: tnfoview-${{ matrix.build-type }}-Linux-${{ matrix.arch.deploy_arch }}
          path: |
            ${{github.workspace}}/tnfoview-*.AppImage
            ${{github.workspace}}/tnfoview-*.zip
      - name: Attest
        uses: 'actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32'
        with:
          subject-path: |
            ${{github.workspace}}/tnfoview-*.AppImage
            ${{github.workspace}}/tnfoview-*.zip
      - if: ${{ github.ref_type == 'tag' && matrix.build-type == 'Release' }}
        name: Upload package
        env:
          GH_TOKEN: ${{ github.token }}
          REF_NAME: ${{ github.ref_name }}
        run: |
          gh release create "$REF_NAME" --draft --title "$REF_NAME" --notes '' --verify-tag || true
          gh release upload "$REF_NAME" tnfoview-*.AppImage --clobber
    strategy:
      fail-fast: false
      matrix:
        arch:
          - deploy_arch: aarch64
            runner: ubuntu-24.04-arm
          - deploy_arch: x86_64
            runner: ubuntu-latest
        build-type: [Debug, Release]
name: Build
'on':
  push:
    branches: [master]
    tags:
      - 'v*.*.*'
  pull_request:
    branches: [master]
permissions:
  contents: read
