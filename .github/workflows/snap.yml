jobs:
  build:
    runs-on: '${{ matrix.system.image }}'
    steps:
      - uses: 'actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0'
        with:
          persist-credentials: false
      - id: 'build'
        name: 'Build Snap package'
        uses: 'snapcore/action-build@3bdaa03e1ba6bf59a65f84a751d943d549a54e79'
        with:
          snapcraft-args: 'pack'
          snapcraft-channel: 'latest/stable'
      - name: 'Upload Artifacts'
        uses: 'actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a'
        with:
          if-no-files-found: 'error'
          name: 'tnfoview-snap-${{ matrix.system.arch }}'
          path: '*.snap'
      - name: 'Attest'
        uses: 'actions/attest@59d89421af93a897026c735860bf21b6eb4f7b26'
        with:
          subject-path: '*.snap'
      - if: "github.ref_type == 'tag'"
        name: 'Upload package'
        env:
          GH_TOKEN: '${{ github.token }}'
          REF_NAME: '${{ github.ref_name }}'
        run: |
          gh release create "$REF_NAME" --draft --title "$REF_NAME" --notes '' --verify-tag || true
          gh release upload "$REF_NAME" *.snap --clobber
    strategy:
      matrix:
        system:
          - arch: 'amd64'
            image: 'ubuntu-24.04'
          - arch: 'arm64'
            image: 'ubuntu-24.04-arm'
name: 'Snap'
'on':
  push:
    branches:
      - 'master'
    paths:
      - '.github/workflows/snap.yml'
      - 'CMakeLists.txt'
      - 'snapcraft.yaml'
      - 'src/**'
      - 'vcpkg.json'
    tags:
      - 'v*.*.*'
permissions:
  attestations: 'write'
  contents: 'write'
  id-token: 'write'
